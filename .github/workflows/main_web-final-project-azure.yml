# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - web-final-project-Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    # sqlite3 會編出與執行環境綁定的原生模組；這裡固定用 ubuntu-22.04，
    # 避免在比 Azure App Service 更新的 runner 上建置後，因 GLIBC 版本過新而無法在 Azure 啟動。
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            myexpressWeb/package-lock.json
            vue-web/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix myexpressWeb

      - name: Rebuild sqlite3 from source
        # sqlite3 6.x 會優先下載預編譯 binary；目前抓到的版本要求 GLIBC_2.38，
        # 但 Azure App Service Linux 上沒有那麼新的 glibc，所以這裡強制在 runner 上從原始碼重編。
        run: npm rebuild sqlite3 --build-from-source --prefix myexpressWeb

      - name: Install frontend dependencies
        run: npm install --prefix vue-web

      - name: Build frontend
        run: npm run build --prefix vue-web

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      id-token: write

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'web-final-project-Azure'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EDE9F1E61E5D4D26A00A12AA5D4289C9 }}
